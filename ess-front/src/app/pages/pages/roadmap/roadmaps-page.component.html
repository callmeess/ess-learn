<section class="page">
  <div class="heading-row">
    <div>
      <h2>Learning Roadmaps</h2>
      <p>Visual learning paths with prerequisites and parallel courses</p>
    </div>
    <button type="button" class="primary" (click)="openCreateForm()">Create Roadmap</button>
  </div>

  <div class="toolbar">
    <input
      class="search-box"
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="Search roadmaps..."
    />

    <select class="filter-select" [(ngModel)]="sortBy">
      <option value="recent">Recent</option>
      <option value="name">By Name</option>
    </select>
  </div>

  <div class="grid">
    <article class="card" *ngFor="let roadmap of getFilteredRoadmaps([])">
      <div class="content">
        <div class="top">
          <span class="badge">{{ roadmap.name }}</span>
        </div>
        <a [routerLink]="['/roadmap-details', roadmap.id]" class="title">{{ roadmap.name }}</a>
        <p class="desc">{{ roadmap.description }}</p>

        <div class="actions">
          <a [routerLink]="['/roadmap-details', roadmap.id]" class="continue-btn">
            View Details
          </a>
          <button type="button" class="ghost" (click)="deleteRoadmap(roadmap.id)">Delete</button>
        </div>
      </div>
    </article>
  </div>

  <article class="empty-state" *ngIf="true">
    <p class="empty-title">No roadmaps found</p>
    <p class="empty-sub">Create a new roadmap to get started.</p>
  </article>
</section>

<div class="modal-overlay" *ngIf="showCreateForm" (click)="closeCreateForm()">
  <article class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Create Roadmap</h3>
      <button type="button" class="close-btn" (click)="closeCreateForm()">✕</button>
    </div>
    <p class="modal-sub">Define your new learning path</p>

    <label class="field-label">Roadmap Name</label>
    <input class="field-input" [(ngModel)]="newRoadmap.name" placeholder="e.g., Machine Learning Mastery" />

    <label class="field-label">Description</label>
    <textarea class="field-input text-area" [(ngModel)]="newRoadmap.description" placeholder="Brief description..."></textarea>

    <div class="modal-actions">
      <button type="button" class="ghost" (click)="closeCreateForm()">Cancel</button>
      <button type="button" class="primary" (click)="createRoadmap()">Create Roadmap</button>
    </div>
  </article>
</div>
