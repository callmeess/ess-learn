services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: esslearn
      POSTGRES_USER: esslearn
      POSTGRES_PASSWORD: esslearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: "Host=db;Port=5432;Database=esslearn;Username=esslearn;Password=esslearn"
      ConnectionStrings__Redis: "redis:6379"
      YouTube__ApiKey: "${YOUTUBE_API_KEY}"
      VideoStorage__DownloadPath: "/app/downloads"
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_URL: "http://localhost:5083"
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
